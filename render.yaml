services:
  - type: web
    name: doc-processor-api
    env: python
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doc-processor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: doc-processor-redis
          type: redis
          property: connectionString
      - key: FRONTEND_URL
        value: https://your-app.vercel.app
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: worker
    name: doc-processor-worker
    env: python
    buildCommand: pip install --upgrade pip && pip install -r backend/requirements.txt
    startCommand: celery -A backend.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: doc-processor-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: doc-processor-redis
          type: redis
          property: connectionString
      - key: PYTHON_VERSION
        value: 3.11.0

  - type: redis
    name: doc-processor-redis
    ipAllowList: []
    plan: free

databases:
  - name: doc-processor-db
    databaseName: docprocessor
    user: docprocessor
